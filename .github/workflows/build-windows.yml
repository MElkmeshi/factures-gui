name: Build Windows EXE

# Build the factures GUI into a standalone Windows .exe.
# Runs on every push, and can be triggered by hand from the Actions tab.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller openpyxl

      - name: Build EXE
        run: >
          pyinstaller --onefile --windowed
          --name FacturesGUI
          factures_gui.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: FacturesGUI-windows
          path: dist/FacturesGUI.exe
